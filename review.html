<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Boot Camp FX a Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --predawn:#0F1B2C;
    --predawn-2:#16273D;
    --pine:#14291F;
    --dawn:#E8933A;
    --gold:#F2B84B;
    --day:#FBF7EE;
    --day-2:#F3ECDC;
    --ink:#14100A;
    --mist:#9FB0C4;
    --stone:#6A6255;
    --line-day:#E4DAC6;
    --display:'Fraunces', serif;
    --body:'Instrument Sans', sans-serif;
    --mono:'Spline Sans Mono', monospace;
    --ease:cubic-bezier(.22,.7,.25,1);
  }
  html{ scroll-behavior:smooth; }
  body{ font-family:var(--body); background:var(--day); color:var(--ink); line-height:1.6; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
  img, svg{ display:block; max-width:100%; }
  a{ color:inherit; }
  ::selection{ background:var(--dawn); color:#fff; }
  :focus-visible{ outline:3px solid var(--dawn); outline-offset:3px; border-radius:4px; }
  .display{ font-family:var(--display); font-weight:600; line-height:1.04; letter-spacing:-.01em; }
  .mono{ font-family:var(--mono); }

  .clock{ font-family:var(--mono); font-weight:600; font-size:.78rem; letter-spacing:.24em; text-transform:uppercase; display:inline-flex; align-items:center; gap:10px; }
  .clock::before{ content:""; width:8px; height:8px; border-radius:50%; background:currentColor; opacity:.7; }

  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:10px; font-weight:700; text-decoration:none; border-radius:14px; padding:16px 28px; font-size:1rem; transition:transform .16s var(--ease), background .16s var(--ease); cursor:pointer; border:0; }
  .btn-dawn{ background:var(--dawn); color:#1B1206; animation:ctaPulse 3s ease-in-out infinite; }
  .btn-dawn:hover{ transform:translateY(-2px); background:var(--gold); animation:none; }

  /* ============ REVIEW HERO — same system as the site's 5:30 AM hero ============ */
  .hero{ position:relative; min-height:100svh; display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg, var(--predawn) 0%, var(--predawn-2) 62%, #2C3A50 100%); color:#fff; overflow:hidden; padding:120px 24px 160px; text-align:center; }

  .hero-stars{ position:absolute; inset:0; opacity:0; animation:starsAppear 1.2s ease-out .3s forwards; }
  .star{
    position:absolute; left:var(--x); top:var(--y);
    width:calc(5px * var(--s)); height:calc(5px * var(--s));
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.92), rgba(255,249,220,.35) 40%, transparent 70%);
    animation-name:twinkle;
    animation-duration:calc(3.2s / var(--s));
    animation-delay:var(--d);
    animation-iteration-count:infinite;
    animation-direction:alternate;
    animation-timing-function:ease-in-out;
    animation-fill-mode:both;
  }
  .star[style*="--t:2"]{ animation-name:twinkleSlow; }
  .star[style*="--t:3"]{ animation-name:twinkleShift; }
  @keyframes starsAppear{ to{ opacity:1; } }
  @keyframes twinkle{
    0%  { opacity:.25; transform:scale(.65); }
    40% { opacity:.9;  transform:scale(1.15); }
    70% { opacity:.55; transform:scale(.85); }
    100%{ opacity:.35; transform:scale(.7); }
  }
  @keyframes twinkleSlow{
    0%  { opacity:.2;  transform:scale(.7); }
    55% { opacity:.85; transform:scale(1.08); }
    100%{ opacity:.25; transform:scale(.65); }
  }
  @keyframes twinkleShift{
    0%  { opacity:.3;  transform:scale(.75); background:radial-gradient(circle, rgba(255,255,255,.85), rgba(255,249,220,.3) 40%, transparent 70%); }
    45% { opacity:.95; transform:scale(1.18); background:radial-gradient(circle, rgba(255,255,250,1), rgba(255,249,220,.55) 35%, transparent 65%); }
    100%{ opacity:.28; transform:scale(.7);  background:radial-gradient(circle, rgba(255,255,255,.8), rgba(255,249,220,.25) 40%, transparent 70%); }
  }

  .sun{ position:absolute; left:50%; bottom:86px; width:180px; height:180px; margin-left:-90px; border-radius:50%;
    background:radial-gradient(circle, #FFE9B8 0%, var(--gold) 42%, var(--dawn) 72%, rgba(232,147,58,0) 74%);
    filter:blur(1px);
    box-shadow:0 0 40px rgba(242,184,75,.3), 0 0 80px rgba(242,184,75,.15), 0 0 120px rgba(232,147,58,.08);
    transform:translateY(160px);
    animation: sunrise 3.2s var(--ease) .4s forwards, glowPulse 3.4s ease-in-out 3.8s infinite, shimmer 4.2s ease-in-out 3.8s infinite; }
  .sun::before{ content:""; position:absolute; inset:-60px; border-radius:50%; z-index:-1;
    background:radial-gradient(circle,
      rgba(242,184,75,.22) 28%, rgba(242,184,75,.10) 48%,
      rgba(232,147,58,.04) 66%, rgba(232,147,58,0) 74%,
      rgba(242,184,75,.06) 82%, transparent 100%);
    opacity:.65; animation:coronaBreath 4s ease-in-out 3.8s infinite; }
  .sun::after{ content:""; position:absolute; inset:-90px; border-radius:50%;
    background:radial-gradient(circle, rgba(242,184,75,.28), rgba(242,184,75,.06) 58%, transparent 68%);
    opacity:.45; animation:glowExpand 3.6s ease-in-out 3.8s infinite; }
  @keyframes sunrise{ to{ transform:translateY(30px); } }
  @keyframes glowPulse{
    0%,100%{ box-shadow:0 0 40px rgba(242,184,75,.3),  0 0 80px rgba(242,184,75,.15),  0 0 120px rgba(232,147,58,.08); }
    50%    { box-shadow:0 0 64px rgba(242,184,75,.48), 0 0 115px rgba(242,184,75,.26), 0 0 170px rgba(232,147,58,.13); }
  }
  @keyframes shimmer{
    0%,100%{ transform:translateY(30px) scale(1);       filter:blur(1px); }
    25%    { transform:translateY(28px) scale(1.018);   filter:blur(1.3px); }
    50%    { transform:translateY(32px) scale(1.006);   filter:blur(.9px); }
    75%    { transform:translateY(30px) scale(1.024);   filter:blur(1.6px); }
  }
  @keyframes coronaBreath{
    0%,100%{ opacity:.5;  transform:scale(.96); }
    50%    { opacity:.92; transform:scale(1.07); }
  }
  @keyframes glowExpand{
    0%,100%{ opacity:.35; transform:scale(1); }
    50%    { opacity:.78; transform:scale(1.06); }
  }
  @keyframes ctaPulse{
    0%,100%{ transform:scale(1); }
    50%    { transform:scale(1.02); }
  }

  .horizon{ position:absolute; left:0; right:0; bottom:0; height:150px; color:var(--pine); }

  .hero-in{ position:relative; z-index:5; max-width:520px; }
  .hero-in h1{ font-size:clamp(2.1rem,5.5vw,2.9rem); margin-bottom:16px; }
  .hero-in h1 em{ font-style:italic; }
  .hero-in p{ font-size:1.02rem; color:rgba(255,255,255,.85); margin-bottom:30px; }
  .clock{ margin-bottom:22px; opacity:.9; }

  .footnote{ font-family:var(--mono); font-size:.72rem; letter-spacing:.1em; color:rgba(255,255,255,.5); margin-top:18px; text-transform:uppercase; }

  .logo{ font-family:var(--display); font-weight:700; font-size:1.1rem; margin-top:44px; color:rgba(255,255,255,.7); }
  .logo em{ color:var(--dawn); font-style:normal; }

  @media (prefers-reduced-motion: reduce){
    .hero-stars{ opacity:1; animation:none; }
    .star{ animation:none; }
    .sun, .sun::before, .sun::after{ animation:none; transform:translateY(30px); }
    .sun::before{ opacity:.6; transform:none; }
    .sun::after{ opacity:.5; transform:none; }
    .btn-dawn{ animation:none; }
  }
</style>
</head>
<body>
  <header class="hero" id="top">
    <div class="hero-stars" aria-hidden="true">
      <span class="star" style="--x:12%;--y:18%;--s:.9;--d:0s;--t:1"></span>
      <span class="star" style="--x:28%;--y:8%;--s:.6;--d:0.7s;--t:2"></span>
      <span class="star" style="--x:44%;--y:22%;--s:.7;--d:1.4s;--t:3"></span>
      <span class="star" style="--x:63%;--y:12%;--s:.8;--d:0.3s;--t:1"></span>
      <span class="star" style="--x:78%;--y:26%;--s:.65;--d:2.1s;--t:2"></span>
      <span class="star" style="--x:90%;--y:9%;--s:.7;--d:1.0s;--t:3"></span>
      <span class="star" style="--x:52%;--y:33%;--s:.55;--d:1.8s;--t:1"></span>
      <span class="star" style="--x:8%;--y:42%;--s:.5;--d:0.5s;--t:2"></span>
      <span class="star" style="--x:33%;--y:38%;--s:.6;--d:2.4s;--t:3"></span>
      <span class="star" style="--x:67%;--y:45%;--s:.5;--d:1.2s;--t:1"></span>
      <span class="star" style="--x:85%;--y:40%;--s:.7;--d:0.9s;--t:2"></span>
      <span class="star" style="--x:18%;--y:52%;--s:.45;--d:1.6s;--t:3"></span>
      <span class="star" style="--x:48%;--y:48%;--s:.55;--d:0.4s;--t:1"></span>
      <span class="star" style="--x:72%;--y:50%;--s:.5;--d:2.0s;--t:2"></span>
      <span class="star" style="--x:93%;--y:22%;--s:.6;--d:1.1s;--t:3"></span>
      <span class="star" style="--x:5%;--y:28%;--s:.5;--d:0.8s;--t:2"></span>
      <span class="star" style="--x:38%;--y:15%;--s:.75;--d:1.5s;--t:1"></span>
    </div>
    <div class="sun" aria-hidden="true"></div>
    <svg class="horizon" viewBox="0 0 1440 150" preserveAspectRatio="none" aria-hidden="true">
      <path fill="currentColor" d="M0,90 L60,86 C90,84 120,70 150,72 C200,75 220,50 260,52 C300,54 320,78 380,80 C440,82 470,58 520,60 C570,62 600,86 660,88 C740,90 760,64 820,62 C870,60 900,80 960,82 C1030,84 1060,56 1120,58 C1170,60 1200,84 1260,86 C1320,88 1380,74 1440,78 L1440,150 L0,150 Z"/>
      <path fill="currentColor" opacity=".55" d="M0,120 C240,108 480,126 720,116 C960,106 1200,124 1440,112 L1440,150 L0,150 Z"/>
    </svg>

    <div class="hero-in">
      <span class="clock">5:30 AM · Acacia Park · Fullerton</span>
      <h1 class="display">The workout's over.<br><em>Got a minute for us?</em></h1>
      <p>If Boot Camp FX has been part of your mornings, a quick review helps another Fullerton local find their way to the grass.</p>
      <a class="btn btn-dawn" href="https://search.google.com/local/writereview?placeid=ChIJwTCvx8bV3IARAzWGV6lpyfQ">Leave a Google Review</a>
      <div class="footnote">Takes about 30 seconds · Thank you</div>
      <div class="logo">Boot Camp <em>FX</em></div>
    </div>
  </header>
</body>
</html>
